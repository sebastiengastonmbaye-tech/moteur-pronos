name: Cron quotidien

on:
  schedule:
    - cron: "0 5 * * *"    # 05h00 UTC = 05h00 Dakar, tous les jours
  workflow_dispatch:        # + lancement manuel

permissions:
  contents: write

jobs:
  pronos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pandas numpy requests

      - name: Import + vérification + publication
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python cron_quotidien.py

      - name: Synchronisation Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python sync_supabase.py

      - name: Kit marketing du jour
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python generer_kit.py

      - name: Commit horodaté (la preuve du palmarès)
        run: |
          git config user.name "moteur-bot"
          git config user.email "bot@users.noreply.github.com"
          git add donnees/ kit_du_jour.txt
          git commit -m "Pronos du $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "Rien de neuf"
          git push

      - name: Rappels d'abonnement (J-3 et jour J)
        run: |
          curl -s -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/rappels" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
